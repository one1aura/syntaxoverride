<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Override</title>
    <meta name="description" content="Advanced Lua engineering platform for the Roblox ecosystem.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #0f0f1a;
    --bg-card: #12121f;
    --bg-card-hover: #1a1a2e;
    --neon-green: #00ff41;
    --neon-yellow: #e8ff00;
    --neon-cyan: #00e5ff;
    --neon-red: #ff0040;
    --neon-purple: #b400ff;
    --neon-orange: #ff6600;
    --text-primary: #e0e0e0;
    --text-secondary: #888;
    --text-muted: #555;
    --border: #1a1a2e;
    --border-glow: #00ff4130;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }
::selection { background: var(--neon-green); color: var(--bg-primary); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 3px; }
#matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.06; pointer-events: none; }

/* NAVBAR */
.navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; background: rgba(10,10,15,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
.nav-brand { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
.brand-icon { font-size: 1.4rem; filter: drop-shadow(0 0 8px var(--neon-yellow)); }
.brand-text { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; color: var(--neon-green); letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-green); }
.nav-links { display: flex; align-items: center; gap: 0.25rem; }
.nav-link { padding: 0.5rem 0.75rem; color: var(--text-secondary); text-decoration: none; font-size: 0.75rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; border-radius: 4px; }
.nav-link:hover { color: var(--neon-green); background: rgba(0,255,65,0.08); text-shadow: 0 0 8px var(--neon-green); }
.nav-link.active { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
.discord-btn { color: var(--neon-yellow)!important; border: 1px solid var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); box-shadow: 0 0 10px rgba(232,255,0,0.15); }
.discord-btn:hover { background: rgba(232,255,0,0.15)!important; color: var(--neon-yellow)!important; }
.cmd-btn { padding: 0.4rem 0.75rem; background: transparent; border: 1px solid var(--text-muted); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.7rem; cursor: pointer; border-radius: 4px; transition: all 0.3s; }
.cmd-btn:hover { border-color: var(--neon-green); color: var(--neon-green); }
.hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 5px; }
.hamburger span { width: 24px; height: 2px; background: var(--neon-green); transition: all 0.3s; }

/* AUTH */
.auth-btn { padding: 0.4rem 0.75rem; background: var(--neon-green); color: var(--bg-primary); font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
.auth-btn:hover { box-shadow: 0 0 15px rgba(0,255,65,0.4); }
.user-menu { position: relative; display: flex; align-items: center; gap: 0.5rem; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--neon-green); cursor: pointer; object-fit: cover; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--neon-green); }
.user-dropdown { display: none; position: absolute; top: 45px; right: 0; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; min-width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; z-index: 2000; }
.user-dropdown.open { display: block; }
.dropdown-item { padding: 0.75rem 1rem; font-size: 0.75rem; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
.dropdown-item:hover { background: rgba(0,255,65,0.08); color: var(--neon-green); }
.dropdown-divider { height: 1px; background: var(--border); }
.dropdown-item.admin { color: var(--neon-red); }
.dropdown-item.admin:hover { background: rgba(255,0,64,0.08); color: var(--neon-red); }

/* COMMAND PALETTE */
.command-palette { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000; }
.command-palette.open { display: block; }
.cmd-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
.cmd-modal { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--bg-secondary); border: 1px solid var(--neon-green); border-radius: 8px; box-shadow: 0 0 30px rgba(0,255,65,0.1); overflow: hidden; }
.cmd-header { display: flex; justify-content: space-between; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.65rem; color: var(--text-muted); }
.cmd-input { width: 100%; padding: 1rem; background: transparent; border: none; color: var(--neon-green); font-family: var(--font-mono); font-size: 0.9rem; outline: none; }
.cmd-input::placeholder { color: var(--text-muted); }
.cmd-results { max-height: 300px; overflow-y: auto; border-top: 1px solid var(--border); }
.cmd-item { padding: 0.75rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; font-size: 0.8rem; color: var(--text-secondary); transition: all 0.2s; }
.cmd-item:hover { background: rgba(0,255,65,0.08); color: var(--neon-green); }

/* STATUS BAR */
.status-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; gap: 2rem; padding: 0 1.5rem; height: 32px; background: rgba(10,10,15,0.95); border-top: 1px solid var(--border); font-size: 0.65rem; color: var(--text-muted); backdrop-filter: blur(10px); }
.status-item { display: flex; gap: 0.4rem; }
.status-label { color: var(--text-muted); }
.status-value { color: var(--neon-green); }
.status-item.version { margin-left: auto; }

/* MAIN */
#app { position: relative; z-index: 1; margin-top: 60px; margin-bottom: 32px; min-height: calc(100vh - 92px); }

/* HOME */
.home-hero { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 92px); padding: 2rem; gap: 2rem; align-items: center; }
.code-editor { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,65,0.05); }
.editor-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); }
.editor-dots { display: flex; gap: 6px; }
.editor-dots span { width: 10px; height: 10px; border-radius: 50%; }
.dot-red { background: #ff5f57; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #28c840; }
.editor-title { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.editor-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 3px; background: rgba(0,255,65,0.15); color: var(--neon-green); border: 1px solid rgba(0,255,65,0.3); }
.editor-code { padding: 1.5rem; font-size: 0.8rem; line-height: 1.7; overflow-x: auto; }
.code-line { display: flex; gap: 1rem; }
.line-num { color: var(--text-muted); min-width: 2ch; text-align: right; user-select: none; }
.kw { color: #ff79c6; } .fn { color: #50fa7b; } .str { color: #f1fa8c; } .cm { color: #6272a4; } .var { color: #8be9fd; } .num { color: #bd93f9; }
.hero-content { display: flex; flex-direction: column; gap: 1.5rem; padding: 2rem; }
.hero-label { font-size: 0.7rem; color: var(--neon-green); letter-spacing: 3px; text-transform: uppercase; }
.hero-title { font-family: var(--font-display); font-size: 3rem; font-weight: 900; line-height: 1.1; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.1); }
.hero-desc { font-size: 0.85rem; line-height: 1.7; color: var(--text-secondary); max-width: 500px; }
.hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
.btn-primary { padding: 0.8rem 1.5rem; background: var(--neon-green); color: var(--bg-primary); font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
.btn-primary:hover { box-shadow: 0 0 20px rgba(0,255,65,0.4); transform: translateY(-2px); }
.btn-secondary { padding: 0.8rem 1.5rem; background: transparent; color: var(--text-primary); font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.3s; }
.btn-secondary:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px var(--border-glow); }
.hero-shortcut { font-size: 0.7rem; color: var(--text-muted); }
.metrics-section { padding: 4rem 2rem; }
.metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; max-width: 1000px; margin: 0 auto; }
.metric-card { background: var(--bg-card); border: 1px dashed var(--neon-yellow); border-radius: 8px; padding: 1.5rem; text-align: center; transition: all 0.3s; }
.metric-card:hover { border-color: var(--neon-green); box-shadow: 0 0 20px var(--border-glow); transform: translateY(-3px); }
.metric-value { font-family: var(--font-display); font-size: 2rem; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 15px rgba(0,255,65,0.3); }
.metric-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
.protocol-section { padding: 4rem 2rem; max-width: 900px; margin: 0 auto; }
.section-title { font-family: var(--font-display); font-size: 1.2rem; color: var(--neon-green); margin-bottom: 2rem; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0,255,65,0.3); }
.protocol-steps { display: flex; flex-direction: column; gap: 1.5rem; }
.protocol-step { display: flex; align-items: flex-start; gap: 1.5rem; padding: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; transition: all 0.3s; }
.protocol-step:hover { border-color: var(--neon-green); box-shadow: 0 0 15px var(--border-glow); }
.step-num { font-family: var(--font-display); font-size: 1.5rem; font-weight: 900; color: var(--neon-yellow); min-width: 40px; }
.step-title { font-size: 0.9rem; font-weight: 700; color: var(--neon-green); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 2px; }
.step-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }

/* PAGES */
.page-container { padding: 2rem; max-width: 1200px; margin: 0 auto; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.page-title { font-family: var(--font-display); font-size: 1.5rem; color: var(--neon-green); letter-spacing: 3px; text-shadow: 0 0 15px rgba(0,255,65,0.3); }
.page-count { font-size: 0.75rem; color: var(--text-muted); }
.search-bar { width: 100%; padding: 0.75rem 1rem; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--neon-green); font-family: var(--font-mono); font-size: 0.8rem; border-radius: 4px; outline: none; margin-bottom: 1rem; transition: border-color 0.3s; }
.search-bar:focus { border-color: var(--neon-green); box-shadow: 0 0 10px var(--border-glow); }
.search-bar::placeholder { color: var(--text-muted); }
.filter-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
.filter-btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 4px; transition: all 0.3s; }
.filter-btn:hover, .filter-btn.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0,255,65,0.08); }
.scripts-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(350px,1fr)); gap: 1.5rem; }
.script-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
.script-card:hover { border-color: var(--neon-green); box-shadow: 0 0 20px var(--border-glow); transform: translateY(-3px); }
.script-card-header { padding: 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.script-status { font-size: 0.6rem; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.status-active { background: rgba(0,255,65,0.15); color: var(--neon-green); border: 1px solid rgba(0,255,65,0.3); }
.status-testing { background: rgba(232,255,0,0.15); color: var(--neon-yellow); border: 1px solid rgba(232,255,0,0.3); }
.status-patched { background: rgba(255,0,64,0.15); color: var(--neon-red); border: 1px solid rgba(255,0,64,0.3); }
.script-game-tag { font-size: 0.65rem; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; }
.script-card-body { padding: 1.25rem; }
.script-title { font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
.script-desc { font-size: 0.75rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.script-meta { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.meta-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.risk-low { background: rgba(0,255,65,0.1); color: var(--neon-green); }
.risk-medium { background: rgba(232,255,0,0.1); color: var(--neon-yellow); }
.risk-high { background: rgba(255,0,64,0.1); color: var(--neon-red); }
.badge-keyless { background: rgba(0,229,255,0.1); color: var(--neon-cyan); }
.badge-key { background: rgba(180,0,255,0.1); color: var(--neon-purple); }
.badge-universal { background: rgba(255,102,0,0.1); color: var(--neon-orange); }
.script-card-footer { padding: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.script-version { font-size: 0.65rem; color: var(--text-muted); }
.view-code-btn { padding: 0.4rem 1rem; background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 3px; transition: all 0.3s; }
.view-code-btn:hover { background: rgba(0,255,65,0.15); box-shadow: 0 0 15px var(--border-glow); }

/* SCRIPT DETAIL */
.script-detail { max-width: 900px; margin: 0 auto; padding: 2rem; }
.back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.75rem; cursor: pointer; border-radius: 4px; margin-bottom: 2rem; transition: all 0.3s; }
.back-btn:hover { border-color: var(--neon-green); color: var(--neon-green); }
.detail-code-block { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 1rem; }
.detail-code-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); }
.copy-btn { padding: 0.4rem 1rem; background: var(--neon-green); color: var(--bg-primary); font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: none; border-radius: 3px; cursor: pointer; transition: all 0.3s; }
.copy-btn:hover { box-shadow: 0 0 15px rgba(0,255,65,0.4); }
.copy-btn.copied { background: var(--neon-cyan); }
.detail-code-content { padding: 1.5rem; font-size: 0.8rem; line-height: 1.8; overflow-x: auto; white-space: pre-wrap; color: var(--text-primary); }
.detail-meta-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 1rem; margin-top: 1.5rem; }
.detail-meta-item { padding: 1rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; }
.detail-meta-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
.detail-meta-value { font-size: 0.85rem; color: var(--neon-green); font-weight: 600; }

/* TERMINAL */
.terminal-input-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.terminal-input { flex: 1; padding: 0.75rem 1rem; background: var(--bg-secondary); border: 1px solid var(--neon-green); color: var(--neon-green); font-family: var(--font-mono); font-size: 0.85rem; border-radius: 4px; outline: none; }
.terminal-input::placeholder { color: rgba(0,255,65,0.3); }
.terminal-enter-btn { padding: 0.75rem 1.5rem; background: var(--neon-green); color: var(--bg-primary); font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
.terminal-enter-btn:hover { box-shadow: 0 0 20px rgba(0,255,65,0.4); }
.terminal-file-header { font-size: 0.7rem; color: var(--text-muted); padding: 0.75rem 1rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px 6px 0 0; letter-spacing: 1px; }
.terminal-list { border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
.terminal-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); transition: all 0.3s; cursor: pointer; }
.terminal-item:last-child { border-bottom: none; }
.terminal-item:hover { background: rgba(0,255,65,0.05); }
.terminal-line-num { font-size: 0.7rem; color: var(--text-muted); min-width: 25px; }
.terminal-item-title { font-size: 0.85rem; color: #fff; font-weight: 600; }
.terminal-item-meta { display: flex; gap: 0.75rem; margin-left: auto; flex-shrink: 0; }
.terminal-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; }
.terminal-legend { display: flex; gap: 1.5rem; margin-top: 1.5rem; font-size: 0.7rem; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 0.4rem; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-dot.working { background: var(--neon-green); }
.legend-dot.patched { background: var(--neon-red); }
.legend-dot.testing { background: var(--neon-yellow); }

/* CHANGELOG */
.changelog-timeline { position: relative; padding-left: 2rem; }
.changelog-timeline::before { content: ''; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.changelog-entry { position: relative; padding: 1.5rem; margin-bottom: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; transition: all 0.3s; }
.changelog-entry:hover { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0,229,255,0.1); }
.changelog-entry::before { content: ''; position: absolute; left: -2rem; top: 1.75rem; width: 12px; height: 12px; border-radius: 50%; background: var(--neon-cyan); border: 2px solid var(--bg-primary); box-shadow: 0 0 10px rgba(0,229,255,0.3); }
.changelog-date { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.changelog-type { display: inline-block; font-size: 0.6rem; padding: 2px 8px; border-radius: 3px; background: rgba(0,229,255,0.15); color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.75rem; }
.changelog-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
.changelog-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }

/* RULES */
.rules-list { display: flex; flex-direction: column; gap: 0.75rem; }
.rule-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.rule-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; cursor: pointer; transition: all 0.3s; }
.rule-header:hover { background: rgba(0,255,65,0.03); }
.rule-num-title { display: flex; align-items: center; gap: 0.75rem; }
.rule-num { font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; min-width: 24px; }
.rule-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.rule-arrow { font-size: 0.75rem; color: var(--text-muted); transition: transform 0.3s; }
.rule-item.open .rule-arrow { transform: rotate(180deg); }
.rule-content { display: none; padding: 0 1.25rem 1.25rem; font-size: 0.8rem; color: var(--text-secondary); line-height: 1.8; }

// ========================================
function initMatrix() {
    var canvas = document.getElementById('matrix-canvas');
    var ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    var chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789';
    var fontSize = 14;
    var columns = Math.floor(canvas.width / fontSize);
    var drops = [];
    for (var i = 0; i < columns; i++) drops[i] = 1;
    function draw() {
        ctx.fillStyle = 'rgba(10,10,15,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff41';
        ctx.font = fontSize + 'px monospace';
        for (var i = 0; i < drops.length; i++) {
            var text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 50);
    window.addEventListener('resize', function() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
}

// ========================================
// FIRESTORE
// ========================================
function loadFirestoreScripts() {
    return db.collection('scripts').orderBy('createdAt', 'desc').get().then(function(snap) {
        firestoreScripts = [];
        snap.forEach(function(doc) {
            var d = doc.data();
            d.id = 'fb_' + doc.id;
            d.firebaseId = doc.id;
            d.isFirebase = true;
            firestoreScripts.push(d);
        });
        return firestoreScripts;
    }).catch(function() { return []; });
}

function getAllScripts() {
    return SCRIPTS.concat(firestoreScripts);
}

function submitScript(formData) {
    if (!currentUser) { showToast('You must be logged in', true); return Promise.reject(); }
    return db.collection('pending').add({
        title: formData.title,
        game: formData.game,
        description: formData.description,
        code: formData.code,
        keyType: formData.keyType,
        riskLevel: formData.riskLevel,
        category: formData.category,
        version: '1.0.0',
        status: 'active',
        views: 0,
        submittedBy: currentUser.displayName || currentUser.email,
        submittedByUid: currentUser.uid,
        submittedByEmail: currentUser.email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
        showToast('Script submitted for review!');
        navigate('library');
    });
}

function approveScript(pendingId) {
    return db.collection('pending').doc(pendingId).get().then(function(doc) {
        if (!doc.exists) return;
        var data = doc.data();
        delete data.submittedByUid;
        delete data.submittedByEmail;
        return db.collection('scripts').add(data).then(function() {
            return db.collection('pending').doc(pendingId).delete();
        });
    }).then(function() {
        showToast('Script approved!');
        loadFirestoreScripts().then(function() { navigate('admin'); });
    });
}

function rejectScript(pendingId) {
    return db.collection('pending').doc(pendingId).delete().then(function() {
        showToast('Script rejected');
        navigate('admin');
    });
}

function incrementViews(scriptId) {
    if (scriptId.startsWith && scriptId.startsWith('fb_')) {
        var fbId = scriptId.replace('fb_', '');
        db.collection('scripts').doc(fbId).update({
            views: firebase.firestore.FieldValue.increment(1)
        }).catch(function() {});
    }
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function copyCode(btn, scriptId) {
    var all = getAllScripts();
    var script = all.find(function(s) { return s.id === scriptId; });
    if (!script) return;
    navigator.clipboard.writeText(script.code).then(function() {
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'COPY CODE'; btn.classList.remove('copied'); }, 2000);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = script.code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'COPY CODE'; btn.classList.remove('copied'); }, 2000);
    });
}

        else result = result.filter(function(s) { return s.keyType === currentFilter; });

        result = result.filter(function(s) { return s.title.toLowerCase().includes(q) || s.game.toLowerCase().includes(q) || s.description.toLowerCase().includes(q); });

}

        html += '<div class="terminal-item" onclick="navigate(\'script-detail\',\'' + s.id + '\')" data-title="' + s.title.toLowerCase() + '" data-game="' + s.game.toLowerCase() + '">' +
            '<span class="terminal-line-num">' + String(i + 1).padStart(2, '0') + '</span>' +
            '<span class="terminal-item-title">' + escapeHtml(s.title) + '</span>' +
            '<div class="terminal-item-meta"><span class="terminal-tag" style="background:rgba(0,229,255,0.1);color:var(--neon-cyan);">' + escapeHtml(s.game) + '</span>' +
            '<span class="terminal-tag" style="background:rgba(0,0,0,0.3);color:var(--text-muted);">' + latency + 'ms</span>' +
            '<span class="terminal-tag badge-keyless">' + s.keyType.toUpperCase() + '</span>' +
            '<span style="width:8px;height:8px;border-radius:50%;background:' + statusColor + ';flex-shrink:0;"></span></div></div>';
    });
    html += '</div><div class="terminal-legend">' +
        '<div class="legend-item"><span class="legend-dot working"></span> Working / Active</div>' +
        '<div class="legend-item"><span class="legend-dot patched"></span> Patched / Not Working</div>' +
        '<div class="legend-item"><span class="legend-dot testing"></span> Testing</div>' +
        '</div>' + makeFooter() + '</div>';
    return html;
}

function runTerminalCmd() {
    var input = document.getElementById('terminalInput');
    var output = document.getElementById('terminalOutput');
    var cmd = input.value.trim();
    if (!cmd) return;
    var result = '';
    if (cmd.toLowerCase().includes('print')) {
        var match = cmd.match(/print\s*\(\s*["'](.+?)["']\s*\)/);
        result = match ? match[1] : 'nil';
    } else if (cmd.toLowerCase() === 'help') {
        result = 'Commands: print("text"), help, clear, version, scripts';
    } else if (cmd.toLowerCase() === 'clear') { output.innerHTML = ''; input.value = ''; return;
    } else if (cmd.toLowerCase() === 'version') { result = 'Syntax Override Terminal v4.2.1';
    } else if (cmd.toLowerCase() === 'scripts') { result = getAllScripts().filter(function(s) { return s.category === 'terminal'; }).map(function(s) { return s.title; }).join('\n');
    } else { result = '[ERROR] Unknown command: ' + cmd; }
    output.innerHTML += '<div style="padding:0.5rem 1rem;font-size:0.8rem;border-bottom:1px solid var(--border);"><div style="color:var(--neon-green);">> ' + escapeHtml(cmd) + '</div><div style="color:var(--text-secondary);margin-top:0.25rem;white-space:pre-wrap;">' + escapeHtml(result) + '</div></div>';
    input.value = '';
}

function filterTerminal(q) {
    var items = document.querySelectorAll('.terminal-item');
    var query = q.toLowerCase();
    items.forEach(function(item) {
        var title = item.getAttribute('data-title');
        var game = item.getAttribute('data-game');
        item.style.display = (title.includes(query) || game.includes(query)) ? 'flex' : 'none';
    });
}

function handleSubmit() {
    var title = document.getElementById('uploadTitle').value.trim();
    var game = document.getElementById('uploadGame').value.trim();
    var desc = document.getElementById('uploadDesc').value.trim();
    var code = document.getElementById('uploadCode').value.trim();
    var keyType = document.getElementById('uploadKeyType').value;
    var risk = document.getElementById('uploadRisk').value;
    var category = document.getElementById('uploadCategory').value;
    if (!title || !game || !desc || !code) { showToast('Please fill in all fields', true); return; }
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'SUBMITTING...';
    submitScript({ title: title, game: game, description: desc, code: code, keyType: keyType, riskLevel: risk, category: category }).catch(function() {
        btn.disabled = false;
        btn.textContent = 'SUBMIT FOR REVIEW';
    });
}

function loadAdminData() {
    if (!isAdmin) return;
    var totalScripts = SCRIPTS.length + firestoreScripts.length;
    db.collection('pending').orderBy('createdAt', 'desc').get().then(function(snap) {
        var pendingCount = snap.size;
        db.collection('users').get().then(function(userSnap) {
            var userCount = userSnap.size;
            var statsEl = document.getElementById('adminStats');
            if (statsEl) {
                statsEl.innerHTML = '<div class="admin-stat"><div class="admin-stat-value">' + userCount + '</div><div class="admin-stat-label">Total Users</div></div>' +
                    '<div class="admin-stat"><div class="admin-stat-value">' + totalScripts + '</div><div class="admin-stat-label">Approved Scripts</div></div>' +
                    '<div class="admin-stat"><div class="admin-stat-value">' + pendingCount + '</div><div class="admin-stat-label">Pending Review</div></div>';
            }
        });
        var pendingEl = document.getElementById('pendingList');
        if (!pendingEl) return;
        if (snap.empty) { pendingEl.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">No pending scripts.</p>'; return; }
        var html = '';
        snap.forEach(function(doc) {
            var d = doc.data();
            html += '<div class="pending-card"><div class="pending-card-header"><div><div class="pending-title">' + escapeHtml(d.title || 'Untitled') + '</div>' +
                '<div class="pending-by">Submitted by ' + escapeHtml(d.submittedBy || 'Unknown') + ' &middot; ' + escapeHtml(d.game || 'Unknown') + ' &middot; ' + (d.keyType || 'keyless').toUpperCase() + ' &middot; ' + (d.riskLevel || 'low').toUpperCase() + '_RISK</div></div></div>' +

                '<div class="pending-actions"><button class="approve-btn" onclick="approveScript(\'' + doc.id + '\')">✅ APPROVE</button>' +
                '<button class="reject-btn" onclick="rejectScript(\'' + doc.id + '\')">❌ REJECT</button></div></div>';
        });
        pendingEl.innerHTML = html;
    });
}
