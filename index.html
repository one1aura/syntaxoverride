<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Override</title>
    <meta name="description" content="Advanced Lua engineering platform for the Roblox ecosystem.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Matrix Rain Canvas -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand" onclick="navigate('home')">
            <span class="brand-icon">⚡</span>
            <span class="brand-text">SYNTAX OVERRIDE</span>
        </div>
        <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a onclick="navigate('library')" class="nav-link">Library</a>
            <a onclick="navigate('terminal')" class="nav-link">Terminal</a>
            <a onclick="navigate('changelog')" class="nav-link">Changelog</a>
            <a onclick="navigate('rules')" class="nav-link">Rules</a>
            <a onclick="navigate('about')" class="nav-link">About</a>
            <a href="https://discord.gg/MxtngkPNzy" target="_blank" class="nav-link discord-btn">Discord</a>
            <button class="cmd-btn" onclick="toggleCommandPalette()">[CMD]</button>
        </div>
    </nav>

    <!-- Command Palette -->
    <div class="command-palette" id="commandPalette">
        <div class="cmd-overlay" onclick="toggleCommandPalette()"></div>
        <div class="cmd-modal">
            <div class="cmd-header">
                <span class="cmd-label">COMMAND PALETTE</span>
                <span class="cmd-shortcut">ESC to close</span>
            </div>
            <input type="text" class="cmd-input" id="cmdInput" placeholder="Type a command..." oninput="filterCommands(this.value)">
            <div class="cmd-results" id="cmdResults"></div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item"><span class="status-label">SCRIPTS_ACTIVE:</span> <span class="status-value" id="scriptCount">1,402</span></div>
        <div class="status-item"><span class="status-label">SYSTEM_LATENCY:</span> <span class="status-value" id="latencyValue">12ms</span></div>
        <div class="status-item"><span class="status-label">GLOBAL_INJECTIONS:</span> <span class="status-value">822k</span></div>
        <div class="status-item version">COMMAND CENTER V4.2.1</div>
    </div>

    <!-- Main Content -->
    <main id="app"></main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
